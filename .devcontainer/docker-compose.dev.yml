services:
  bridge:
    container_name: dev-bridge
    image: mcr.microsoft.com/devcontainers/go:2.1.5-1.26@sha256:638cb8e8c040d29fbd0bb9a0d174b10aef96683437f839048d091eb337a8ea85
    ports:
      - "8899:8899"
      - "8888:8888"
      - "8877:8877"
      - "8866:8866"
      - "8855:8855"
      - "8844:8844"
      - "8870:8870"
    volumes:
      - ${BRIDGE_REPOSITORY_FOLDER}:/workspace:cached
    # Overrides default command so things don't shut down after the process ends.
    command: sleep infinity
