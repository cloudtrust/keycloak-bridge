services:
  bridge:
    container_name: dev-bridge
    image: mcr.microsoft.com/devcontainers/go:2.1.4-1.26@sha256:232b16db710cedd1ad955e78ef973d6252ddc1149f299b1eaeb1caaa8c61caf8
    ports:
      - "8899:8899"
      - "8888:8888"
      - "8877:8877"
      - "8866:8866"
      - "8855:8855"
      - "8844:8844"
      - "8870:8870"
    volumes:
      - ${BRIDGE_REPOSITORY_FOLDER}:/workspace:cached
    # Overrides default command so things don't shut down after the process ends.
    command: sleep infinity
